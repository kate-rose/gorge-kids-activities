    color: var(--white);
  }

  .chip.cost-low.active {

// State
let costFilter = "all";
let countyFilter = "all";
let ageFilter = "all";
let searchQuery = "";

function isFree(cost) {
  const c = cost.toUpperCase();
  return c === "FREE" || c === "FREE / $25";
}

function getFiltered() {
  return activities.filter(a => {
    if (costFilter === "free" && !isFree(a.cost)) return false;
    if (costFilter === "low" && isFree(a.cost)) return false;
    if (countyFilter !== "all" && !a.counties.includes(countyFilter)) return false;
    if (ageFilter !== "all" && !a.ageGroups.includes(ageFilter)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (
        !a.name.toLowerCase().includes(q) &&
        !a.location.toLowerCase().includes(q) &&
        !a.desc.toLowerCase().includes(q) &&
        !a.category.toLowerCase().includes(q)
      ) return false;
    }
    return true;
  });
}

  const bar = document.getElementById("results-bar");
  const items = getFiltered();
  bar.textContent = `${items.length} activit${items.length === 1 ? "y" : "ies"} found`;

  if (items.length === 0) {
    grid.innerHTML = `<div class="no-results"><span>🌿</span>No activities match those filters.<br>Try broadening your search.</div>`;
    return;
  }

  grid.innerHTML = items.map(a => {
    const free = isFree(a.cost);
    const costClass = free ? "free" : "low";
    return `
      <div class="card">
        <div class="card-top">
          <div class="card-title">${a.name}</div>
          <span class="badge-cost ${costClass}">${a.cost}</span>
        </div>
        <div class="card-meta">
          <div class="meta-row">${iconCal()} ${a.dates}</div>
          <div class="meta-row">${iconPin()} ${a.location}</div>
          <div class="meta-row">${iconPerson()} ${a.ages}</div>
        </div>
        <div class="card-desc">${a.desc}</div>
        <div class="card-footer">
          <span class="badge-cat">${a.category}</span>
          <a class="card-link" href="${a.link}" target="_blank" rel="noopener">More info →</a>
        </div>
      </div>`;
  }).join("");
}

// Filter chips — attach to document so all filter rows are covered
document.addEventListener("click", e => {
  const chip = e.target.closest(".chip");
  if (!chip) return;
  const { filter, value } = chip.dataset;
  if (!filter) return;

  document.querySelectorAll(`[data-filter="${filter}"]`).forEach(c => c.classList.remove("active"));
  chip.classList.add("active");

  if (filter === "cost") costFilter = value;
  if (filter === "county") countyFilter = value;
  if (filter === "age") ageFilter = value;
  renderCards();
});

// Search
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  renderCards();
});

renderCards();
</script>
</body>
</html>
