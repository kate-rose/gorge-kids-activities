<style>
  :root {
    --cream: #f0ece3;
    --cream-dark: #e5e0d5;

    --ink-mid: #4a4540;
    --ink-light: #8a8480;
    --navy: #1c3a4a;
    --navy-light: #2e5468;
    --amber: #e8b84b;
    --amber-dark: #c99a2e;
    --amber-pale: #fdf4d8;
    --green: #2d6a4f;
    --green-pale: #d4eddf;
    --white: #ffffff;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
  }

  header {
    background: var(--navy);
    color: var(--cream);
    padding: 22px 16px 18px;
    text-align: center;
  }

  header .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 6px;
  }

  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.9rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    line-height: 1.05;
    margin-bottom: 6px;
  }

  header p {
    font-size: 0.85rem;
    opacity: 0.75;
    font-weight: 400;
  }

  .controls {
    background: var(--white);
    padding: 14px 16px;
    border-bottom: 2px solid var(--cream-dark);
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(26,23,20,0.08);
  }

  .search-wrap {
    position: relative;
    margin-bottom: 10px;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-light);
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 9px 12px 9px 34px;
    border: 1.5px solid var(--cream-dark);
    border-radius: var(--radius-sm);
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    background: var(--cream);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: var(--navy); }
  #search::placeholder { color: var(--ink-light); }

  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-light);
    display: flex;
    align-items: center;
    padding-right: 2px;
    white-space: nowrap;
  }

  .chip {
    padding: 5px 13px;
    border-radius: 999px;
    border: 1.5px solid var(--cream-dark);
    background: var(--cream);
    font-family: 'Barlow', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    color: var(--ink-mid);
  }

  .chip:hover {
    border-color: var(--navy);
    color: var(--navy);
    background: var(--white);
  }

  .chip.active {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--white);
  }

  .chip.cost-low.active {
    background: var(--amber-dark);
    border-color: var(--amber-dark);
    color: var(--white);
  }

  .results-bar {
    padding: 10px 16px 2px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  .grid {
    padding: 8px 12px 28px;
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr;
  }

  @media (min-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }

  @media (min-width: 900px) {
    .grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 14px;
    border: 1.5px solid var(--cream-dark);
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: box-shadow 0.15s, transform 0.15s;
  }

  .card:hover {
    box-shadow: 0 4px 16px rgba(26,23,20,0.1);
    transform: translateY(-1px);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: var(--ink);
    flex: 1;
    line-height: 1.2;
  }

  .badge-cost {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-cost.free {
    background: var(--green-pale);
    color: var(--green);
  }

  .badge-cost.low {
    background: var(--amber-pale);
    color: var(--amber-dark);
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .meta-row {
    display: flex;
    align-items: flex-start;
    gap: 5px;
    font-size: 0.8rem;
    color: var(--ink-light);
  }

  .meta-row svg { flex-shrink: 0; margin-top: 1px; }

  .card-desc {
    font-size: 0.82rem;
    color: var(--ink-mid);
    line-height: 1.45;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 2px;
    padding-top: 8px;
    border-top: 1px solid var(--cream-dark);
  }

  .badge-cat {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--cream);
    color: var(--ink-light);
    border: 1px solid var(--cream-dark);
  }

  .card-link {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--navy);
    text-decoration: none;
  }

  .card-link:hover {
    color: var(--amber-dark);
    text-decoration: underline;
  }

    text-align: center;
    padding: 40px 20px;

    grid-column: 1 / -1;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .lang-toggle {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 4px;
    margin-bottom: 10px;

  .lang-btn {
    background: none;
    border: 1.5px solid transparent;

    padding: 2px 7px;

  }

    color: rgba(240,236,227,0.25);
    font-size: 0.75rem;

const ui = {
  en: {
    eyebrow: "❋ Open Gorge · Summer 2026",
    title: "Gorge Kids Activities",
    sub: "Free &amp; low-cost fun across Skamania, Klickitat, Hood River &amp; Wasco counties",
    search: "Search activities, locations…",
    cost: "Cost", county: "County", age: "Ages", type: "Type",
    all: "All", free: "Free", low: "Under $10",
    babies: "Babies/Toddlers", kids: "Kids (4–12)", teens: "Teens",
    concerts: "Concerts", library: "Library", outdoors: "Outdoors",
    arts: "Arts &amp; Crafts", swimming: "Swimming", food: "Food",
    found: n => `${n} activit${n === 1 ? "y" : "ies"} found`,
    moreInfo: "More info →",
    noResults: "No activities match those filters.<br>Try broadening your search.",
  },
  es: {
    eyebrow: "❋ Open Gorge · Verano 2026",
    title: "Actividades para Niños en el Gorge",
    sub: "Actividades gratuitas y de bajo costo en los condados de Skamania, Klickitat, Hood River y Wasco",
    search: "Buscar actividades, lugares…",
    cost: "Costo", county: "Condado", age: "Edades", type: "Tipo",
    all: "Todo", free: "Gratis", low: "Menos de $10",
    babies: "Bebés/Niños pequeños", kids: "Niños (4–12)", teens: "Adolescentes",
    concerts: "Conciertos", library: "Biblioteca", outdoors: "Al aire libre",
    arts: "Arte y manualidades", swimming: "Natación", food: "Comida",
    found: n => `${n} actividad${n === 1 ? "" : "es"} encontrada${n === 1 ? "" : "s"}`,
    moreInfo: "Más información →",
    noResults: "No hay actividades que coincidan.<br>Intenta ampliar tu búsqueda.",
  }
};

// State
let lang = "en";
let costFilter = "all";
let countyFilter = "all";
let ageFilter = "all";
let typeFilter = "all";
let searchQuery = "";

function isFree(cost) {
  const c = cost.toUpperCase();
  return c.startsWith("FREE") && !c.match(/\$[1-9]/);
}

function getFiltered() {
  return activities.filter(a => {
    if (costFilter === "free" && !isFree(a.cost)) return false;
    if (costFilter === "low" && isFree(a.cost)) return false;
    if (countyFilter !== "all" && !a.counties.includes(countyFilter)) return false;
    if (ageFilter !== "all" && !a.ageGroups.includes(ageFilter)) return false;
    if (typeFilter !== "all" && !a.types.includes(typeFilter)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const name = lang === "es" && translations[a.name] ? translations[a.name].name : a.name;
      const desc = lang === "es" && translations[a.name] ? translations[a.name].desc : a.desc;
      if (
        !name.toLowerCase().includes(q) &&
        !desc.toLowerCase().includes(q) &&
        !a.location.toLowerCase().includes(q)
      ) return false;
    }
    return true;
  });
}

function setLang(l) {
  lang = l;
  document.getElementById("btn-en").classList.toggle("active", l === "en");
  document.getElementById("btn-es").classList.toggle("active", l === "es");
  const t = ui[l];
  document.getElementById("hdr-eyebrow").textContent = t.eyebrow;
  document.getElementById("hdr-title").textContent = t.title;
  document.getElementById("hdr-sub").innerHTML = t.sub;
  document.getElementById("search").placeholder = t.search;
  document.getElementById("lbl-cost").textContent = t.cost;
  document.getElementById("lbl-county").textContent = t.county;
  document.getElementById("lbl-age").textContent = t.age;
  document.getElementById("lbl-type").textContent = t.type;
  document.getElementById("chip-cost-all").textContent = t.all;
  document.getElementById("chip-cost-free").textContent = t.free;
  document.getElementById("chip-cost-low").textContent = t.low;
  document.getElementById("chip-county-all").textContent = t.all;
  document.getElementById("chip-age-all").textContent = t.all;
  document.getElementById("chip-age-babies").textContent = t.babies;
  document.getElementById("chip-age-kids").textContent = t.kids;
  document.getElementById("chip-age-teens").textContent = t.teens;
  document.getElementById("chip-type-all").textContent = t.all;
  document.getElementById("chip-type-concerts").textContent = t.concerts;
  document.getElementById("chip-type-library").textContent = t.library;
  document.getElementById("chip-type-outdoors").textContent = t.outdoors;
  document.getElementById("chip-type-arts").innerHTML = t.arts;
  document.getElementById("chip-type-swimming").textContent = t.swimming;
  document.getElementById("chip-type-food").textContent = t.food;
  renderCards();
}

function iconPin() {
  return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 10c0 6-8 13-8 13s-8-7-8-13a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`;
}
function iconCal() {
  return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>`;
}
function iconPerson() {
  return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
}

function renderCards() {
  const grid = document.getElementById("grid");
  const bar = document.getElementById("results-bar");
  const items = getFiltered();
  const t = ui[lang];
  bar.textContent = t.found(items.length);

  if (items.length === 0) {
    grid.innerHTML = `<div class="no-results"><span>🌿</span>${t.noResults}</div>`;
    return;
  }

  grid.innerHTML = items.map(a => {
    const free = isFree(a.cost);
    const costClass = free ? "free" : "low";
    const tr = translations[a.name];
    const name = lang === "es" && tr ? tr.name : a.name;
    const desc = lang === "es" && tr ? tr.desc : a.desc;
    return `
      <div class="card">
        <div class="card-top">
          <div class="card-title">${name}</div>
          <span class="badge-cost ${costClass}">${a.cost}</span>
        </div>
        <div class="card-meta">
          <div class="meta-row">${iconCal()} ${a.dates}</div>
          <div class="meta-row">${iconPin()} ${a.location}</div>
          <div class="meta-row">${iconPerson()} ${a.ages}</div>
        </div>
        <div class="card-desc">${desc}</div>
        <div class="card-footer">
          <span class="badge-cat">${a.category}</span>
          <a class="card-link" href="${a.link}" target="_blank" rel="noopener">${t.moreInfo}</a>
        </div>
      </div>`;
  }).join("");
}

// Filter chips
document.addEventListener("click", e => {
  const chip = e.target.closest(".chip");
  if (!chip) return;
  const { filter, value } = chip.dataset;
  if (!filter) return;
  document.querySelectorAll(`[data-filter="${filter}"]`).forEach(c => c.classList.remove("active"));
  chip.classList.add("active");
  if (filter === "cost") costFilter = value;
  if (filter === "county") countyFilter = value;
  if (filter === "age") ageFilter = value;
  if (filter === "type") typeFilter = value;
  renderCards();
});

// Search
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  renderCards();
});

renderCards();
</script>
